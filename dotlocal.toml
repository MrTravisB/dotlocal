# dotlocal.toml
#
# Single source of truth for machine configuration.
#
# Usage:
#   dotlocal sync              Apply changes
#   dotlocal sync --dry-run    Preview changes
#   dotlocal status            Show drift from desired state

[settings]
backup_dir = "~/.dotlocal-backup"
log_dir = "~/Library/Logs/dotlocal"

