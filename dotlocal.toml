target = "~/Library/LaunchAgents/com.dotlocal.sync.plist"
template_vars = { "__HOME__" = "~" }

# =============================================================================
# Docker Stacks
# =============================================================================

[[docker_stack]]
name = "langfuse"
compose_file = "infra/langfuse/docker-compose.yml"
start_script = "infra/langfuse/start.sh"
requires = ["docker"]

# =============================================================================
# Secrets
# =============================================================================

[[secret]]
name = "GITHUB_TOKEN"
required = true
template = ".secrets.example"

[[secret]]
name = "OPENAI_API_KEY"
required = false

[[secret]]
name = "ANTHROPIC_API_KEY"
required = false

[[secret]]
name = "CONTEXT7_API_KEY"
required = false

[[secret]]
name = "LANGFUSE_SECRET_KEY"
required = false

[[secret]]
name = "LANGFUSE_PUBLIC_KEY"
required = false

# =============================================================================
# Interactive Prompts
# =============================================================================

[[prompt]]
id = "git_identity"
description = "Git user identity"
check = "git config --global user.name"
fields = [
    { name = "user.name", prompt = "Enter your full name for git" },
    { name = "user.email", prompt = "Enter your email for git" },
]
apply = [
    "git config --global user.name '{user.name}'",
    "git config --global user.email '{user.email}'",
]

[[prompt]]
id = "ssh_key"
description = "SSH key generation"
check = "test -f ~/.ssh/id_rsa || test -f ~/.ssh/id_ed25519"
fields = [
    { name = "email", prompt = "Enter your email for SSH key" },
]
apply = [
    "mkdir -p ~/.ssh && chmod 700 ~/.ssh",
    "ssh-keygen -t rsa -b 4096 -C '{email}' -f ~/.ssh/id_rsa -N ''",
]

[[prompt]]
id = "ssh_signing"
description = "SSH commit signing"
check = "git config --global gpg.format"
handler = "ssh_signing"

# =============================================================================
# Encrypted Assets
# =============================================================================

[[encrypted]]
id = "fonts"
archive = "fonts.tar.gz.age"
target = "fonts/"
key_source = "1password"
op_item = "op://Personal/dotlocal-fonts-key/notes"
key_cache = "~/.dotlocal-secrets/fonts.age"
depends_on = ["brew_formula:age", "brew_formula:1password-cli"]

# =============================================================================
# Patches
# =============================================================================

[[patch]]
id = "vscode_insiders_openvsx"
description = "Patch VS Code Insiders for OpenVSX"
target = "/Applications/Visual Studio Code - Insiders.app/Contents/Resources/app/product.json"
requires = ["jq"]
check = "jq -e '.extensionsGallery.serviceUrl == \"https://open-vsx.org/vscode/gallery\"' '/Applications/Visual Studio Code - Insiders.app/Contents/Resources/app/product.json' > /dev/null 2>&1"
apply = "jq '.extensionsGallery = {\"serviceUrl\": \"https://open-vsx.org/vscode/gallery\", \"itemUrl\": \"https://open-vsx.org/vscode/item\"}' '/Applications/Visual Studio Code - Insiders.app/Contents/Resources/app/product.json' > /tmp/product.json.tmp && mv /tmp/product.json.tmp '/Applications/Visual Studio Code - Insiders.app/Contents/Resources/app/product.json'"
backup = true
