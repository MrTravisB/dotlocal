[[git_repo]]
url = "https://github.com/zsh-users/zsh-autosuggestions.git"
target = "~/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
depends_on = ["git_repo:ohmyzsh"]

[[git_repo]]
url = "https://github.com/zsh-users/zsh-completions.git"
target = "~/.oh-my-zsh/custom/plugins/zsh-completions"
depends_on = ["git_repo:ohmyzsh"]

[[git_repo]]
url = "https://github.com/amix/vimrc.git"
target = "~/.vim_runtime"
shallow = true
post_clone = "bash ~/.vim_runtime/install_awesome_vimrc.sh"

[[git_repo]]
